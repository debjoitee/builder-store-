<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Builder's Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="logo-icon">BS</div>
        <h2>Admin Access</h2>
        <p>Builder's Store Control Panel</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="admin@youremail.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>

      <button onclick="login()" class="btn btn-primary btn-login">Login to Dashboard</button>

      <div class="auth-err" id="authErr">Invalid credentials. Please try again.</div>

    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
